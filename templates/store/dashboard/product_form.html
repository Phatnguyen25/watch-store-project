{% load leaflet_tags %}
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>{{ title }} - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>

    {% leaflet_css plugins="forms" %} {% leaflet_js plugins="forms" %}
    {{form.media }}

    <style>
      .leaflet-container {
        height: 400px !important;
        width: 100%;
        border-radius: 0.5rem;
        z-index: 1;
      }
      /* Lệnh cấm Tailwind bóp méo mảnh ghép bản đồ */
      .leaflet-container img {
        max-width: none !important;
      }
    </style>
  </head>
  <body class="bg-gray-100 p-8">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-md">
      <h2 class="text-2xl font-bold mb-6 text-gray-800">{{ title }}</h2>

      <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %} {{ form.as_p }}

        <div class="flex justify-end gap-4 border-t pt-6">
          <a
            href="javascript:history.back()"
            class="px-6 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 font-semibold"
          >
            Hủy
          </a>
          <button
            type="submit"
            class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold"
          >
            Lưu Thông Tin
          </button>
        </div>
      </form>
    </div>
  </body>
</html>

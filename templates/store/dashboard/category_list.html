{% extends 'store/dashboard/dashboard_base.html' %}

{% block header_title %}Quản lý Danh mục{% endblock %}

{% block dashboard_content %}
<div class="flex justify-between items-center mb-6">
    <div class="relative w-96"><input type="text" placeholder="Tìm kiếm..." class="w-full pl-10 py-2 border border-gray-300 rounded-lg text-sm" /><span class="absolute left-3 top-2.5 text-gray-400">🔍</span></div>
    <a href="{% url 'store:category_create' %}" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg font-bold shadow-md hover:bg-blue-700 transition">Thêm Danh Mục</a>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Danh mục</th>
                <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Đường dẫn</th>
                <th class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase">Thao tác</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            {% for cat in categories %}
            <tr class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 text-sm font-bold text-gray-900">{{ cat.name }}</td>
                <td class="px-6 py-4 text-sm text-gray-500 italic">{{ cat.slug }}</td>
                <td class="px-6 py-4 text-right text-sm">
                    <a href="{% url 'store:category_update' cat.pk %}" class="text-blue-600 bg-blue-50 px-3 py-1.5 rounded-md mr-2">Sửa</a>
                    <a href="{% url 'store:category_delete' cat.pk %}" class="text-red-600 bg-red-50 px-3 py-1.5 rounded-md">Xóa</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

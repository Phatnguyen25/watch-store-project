<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Watch Store O2O{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#1d4ed8",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen font-sans">
    <nav class="bg-white shadow-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <a href="/" class="flex-shrink-0 flex items-center gap-2">
              <span class="text-2xl">⌚</span>
              <span class="font-bold text-xl text-blue-700 tracking-tight"
                >WatchStore</span
              >
            </a>

            <div class="hidden md:ml-8 md:flex md:space-x-6">
              <a
                href="{% url 'product_list' %}"
                class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md font-medium transition"
                >Trang chủ</a
              >
              <a
                href="{% url 'product_list' %}"
                class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md font-medium transition"
                >Sản phẩm</a
              >
              <a
                href="{% url 'store_locator' %}"
                class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md font-medium transition"
                >📍 Tìm cửa hàng</a
              >
            </div>
          </div>

          <div class="flex items-center space-x-4">
            <a
              href="{% url 'dashboard_home' %}"
              class="bg-gray-800 text-white hover:bg-black px-4 py-2 rounded-lg font-semibold text-sm transition flex items-center gap-2 shadow-sm"
            >
              💻 Trang Quản Trị
            </a>

            <a
              href="{% url 'cart_detail' %}"
              class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition flex items-center shadow-sm"
            >
              🛒 Giỏ hàng (0)
            </a>
          </div>
        </div>
      </div>
    </nav>

    <main class="flex-grow">{% block content %} {% endblock %}</main>

    <footer class="bg-gray-900 text-gray-300 py-8 mt-12">
      <div class="max-w-7xl mx-auto px-4 text-center">
        <h3 class="text-xl font-bold text-white mb-2">Watch Store O2O</h3>
        <p class="text-sm text-gray-400 mb-4">
          Hệ thống cửa hàng đồng hồ trực tuyến kết hợp định vị không gian
          PostGIS.
        </p>
        <p class="text-sm">
          © 2026 Developed by Tech Lead Phat Nguyen. All rights reserved.
        </p>
      </div>
    </footer>
  </body>
</html>

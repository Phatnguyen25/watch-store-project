{% extends "base.html" %}

{% block title %}Mật Khẩu Đã Đổi - Watch Store O2O{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex justify-center items-center py-12 px-4 sm:px-6 lg:px-8 bg-gray-50">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-10 text-center transform transition-all">
    <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    </div>
    <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-4">Hoàn Tất Thành Công</h2>
    <p class="text-gray-600 mb-8 leading-relaxed">Mật khẩu của bạn đã được thiết lập lại thành công. Bây giờ bạn có thể đăng nhập bằng mật khẩu mới này.</p>
    
    <a href="{% url 'store:login' %}" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition transform hover:-translate-y-0.5">
      Đăng Nhập Ngay
    </a>
  </div>
</div>
{% endblock %}

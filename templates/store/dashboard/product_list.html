{% extends 'base.html' %}
{% load humanize %}

{% block content %}
<div class="max-w-7xl mx-auto py-8 px-4">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900">📦 Quản lý Sản Phẩm</h2>
        <a href="#" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 shadow font-medium">
            + Thêm Mới
        </a>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-800 text-white">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Mã SP</th>
                    <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Tên Đồng Hồ</th>
                    <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Giá</th>
                    <th class="px-6 py-3 text-right text-xs font-medium uppercase tracking-wider">Hành động</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                {% for p in products %}
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-500">#{{ p.id }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ p.name }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-blue-600 font-bold">{{ p.price|intcomma }}₫</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <a href="#" class="text-indigo-600 hover:text-indigo-900 mr-4">Sửa</a>
                        <a href="#" class="text-red-600 hover:text-red-900">Xóa</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

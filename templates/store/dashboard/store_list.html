{% extends 'store/dashboard/dashboard_base.html' %}

{% block header_title %}Quản lý Cửa hàng{% endblock %}

{% block dashboard_content %}
<form method="GET" class="flex justify-between items-center mb-6">
    <div class="flex items-center space-x-2 flex-1 max-w-lg">
        <div class="relative flex-1">
            <input type="text" name="q" value="{{ query }}" placeholder="Tìm cửa hàng..." class="dashboard-search w-full pl-10 py-2 border border-gray-300 rounded-lg text-sm" />
            <button type="submit" class="absolute left-3 top-2.5 text-gray-400">🔍</button>
        </div>
        <select name="status" class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" onchange="this.form.submit()">
            <option value="">Tất cả trạng thái</option>
            <option value="active" {% if status == 'active' %}selected{% endif %}>Đang hoạt động</option>
            <option value="inactive" {% if status == 'inactive' %}selected{% endif %}>Đóng cửa</option>
        </select>
    </div>
    <a href="{% url 'store:store_create' %}" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg font-bold shadow-md hover:bg-blue-700 transition ml-4 whitespace-nowrap">Thêm Cửa Hàng</a>
</form>

<div id="dashboard-table-container">
    {% include 'store/dashboard/store_table_fragment.html' with stores=stores %}
</div>
{% endblock %}

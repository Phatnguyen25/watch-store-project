<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xóa Sản Phẩm - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
        <div class="text-red-500 text-5xl mb-4">⚠️</div>
        <h2 class="text-2xl font-bold mb-2 text-gray-800">Xác nhận xóa!</h2>
        <p class="text-gray-600 mb-8">Bạn có chắc chắn muốn xóa sản phẩm <strong>"{{ product.name }}"</strong> không? Hành động này không thể hoàn tác.</p>
        
        <form method="POST" class="flex justify-center gap-4">
            {% csrf_token %}
            <a href="{% url 'dashboard_product_list' %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 font-semibold">Hủy, quay lại</a>
            <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-semibold">Xóa vĩnh viễn</button>
        </form>
    </div>
</body>
</html>

{% extends 'base.html' %} {% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <a
    href="#"
    class="inline-flex items-center text-blue-600 hover:text-blue-800 mb-8 font-medium transition"
  >
    <svg
      class="w-5 h-5 mr-2"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M10 19l-7-7m0 0l7-7m-7 7h18"
      ></path>
    </svg>
    Quay lại cửa hàng
  </a>

  <div
    class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100"
  >
    <div class="grid grid-cols-1 md:grid-cols-2 gap-0">
      <div class="bg-gray-50 flex items-center justify-center p-8">
        <img
          src="{{ product.image }}"
          alt="{{ product.name }}"
          class="w-full h-auto object-cover rounded-xl shadow-md transform hover:scale-105 transition-transform duration-500"
        />
      </div>

      <div class="p-8 md:p-12">
        <div
          class="uppercase tracking-wide text-sm text-blue-600 font-bold mb-2"
        >
          {{ product.category }}
        </div>
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-4">
          {{ product.name }}
        </h1>
        <p class="text-3xl font-black text-gray-900 mb-6">
          {{ product.price }} ₫
        </p>

        <p class="text-gray-600 text-base leading-relaxed mb-8">
          {{ product.description }}
        </p>

        <div class="border-t border-gray-200 pt-6 mb-8">
          <h3 class="text-lg font-bold text-gray-900 mb-4">
            Thông số kỹ thuật
          </h3>
          <dl class="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-4">
            {% for key, value in product.specs.items %}
            <div class="bg-gray-50 px-4 py-3 rounded-lg">
              <dt class="text-sm font-medium text-gray-500">{{ key }}</dt>
              <dd class="mt-1 text-sm font-bold text-gray-900">{{ value }}</dd>
            </div>
            {% endfor %}
          </dl>
        </div>

        <div class="flex space-x-4">
          <button
            class="flex-1 bg-blue-600 text-white font-bold py-4 px-8 rounded-xl shadow-lg hover:bg-blue-700 hover:shadow-xl transition transform hover:-translate-y-1"
          >
            Thêm vào giỏ hàng
          </button>
          <button
            class="bg-gray-100 text-gray-600 p-4 rounded-xl hover:bg-gray-200 transition"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
              ></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

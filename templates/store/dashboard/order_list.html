{% extends 'store/dashboard/dashboard_base.html' %}
{% load humanize %}

{% block header_title %}Quản lý Đơn Hàng{% endblock %}

{% block dashboard_content %}
<form method="GET" class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-4 w-full">
        <div class="relative w-96">
            <input type="text" name="q" value="{{ q }}" placeholder="Tìm kiếm mã đơn, khách hàng, SĐT..." class="dashboard-search w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-sm" />
            <button type="submit" class="absolute left-3 top-2.5 text-gray-400">🔍</button>
        </div>
        <select name="status" onchange="this.form.submit()" class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 bg-white">
            <option value="">Tất cả trạng thái</option>
            <option value="Pending" {% if status == 'Pending' %}selected{% endif %}>Chờ xử lý</option>
            <option value="Processing" {% if status == 'Processing' %}selected{% endif %}>Đang xử lý</option>
            <option value="Shipped" {% if status == 'Shipped' %}selected{% endif %}>Đang giao hàng</option>
            <option value="Delivered" {% if status == 'Delivered' %}selected{% endif %}>Đã nhận hàng</option>
            <option value="Cancelled" {% if status == 'Cancelled' %}selected{% endif %}>Đã hủy</option>
        </select>
        <a href="{% url 'store:export_orders_excel' %}" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg shadow inline-flex items-center text-sm ml-auto transition">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
            Xuất Excel
        </a>
    </div>
</form>

<div id="dashboard-table-container">
    {% include 'store/dashboard/order_table_fragment.html' with orders=orders page_obj=page_obj %}
</div>
{% endblock %}

<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Mã (Code)</th>
                <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Mức giảm</th>
                <th class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase">Thao tác</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            {% for coupon in coupons %}
            <tr class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 text-sm font-black text-blue-600">{{ coupon.code }}</td>
                <td class="px-6 py-4 text-sm font-bold text-red-500">-{{ coupon.discount_percent }}%</td>
                <td class="px-6 py-4">
                    <div class="flex flex-col lg:flex-row items-end lg:items-center justify-end gap-2 text-sm">
                        <a href="{% url 'store:coupon_update' coupon.pk %}" class="text-blue-600 bg-blue-50 px-4 py-1.5 rounded-lg font-bold hover:bg-blue-100 transition whitespace-nowrap text-center w-20 lg:w-auto">Sửa</a>
                        <a href="{% url 'store:coupon_delete' coupon.pk %}" class="text-red-600 bg-red-50 px-4 py-1.5 rounded-lg font-bold hover:bg-red-100 transition whitespace-nowrap text-center w-20 lg:w-auto">Xóa</a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="px-6 py-10 text-center text-gray-500 italic">Không tìm thấy mã giảm giá nào khớp với tìm kiếm.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="mt-6">
    {% include 'store/dashboard/pagination.html' with page_obj=coupons %}
</div>

{% extends 'store/dashboard/dashboard_base.html' %}

{% block header_title %}Mã Giảm Giá{% endblock %}

{% block dashboard_content %}
<div class="flex justify-between items-center mb-6">
    <div class="relative w-96"><input type="text" placeholder="Tìm mã code..." class="w-full pl-10 py-2 border border-gray-300 rounded-lg text-sm" /><span class="absolute left-3 top-2.5 text-gray-400">🔍</span></div>
    <a href="{% url 'store:coupon_create' %}" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg font-bold shadow-md hover:bg-blue-700 transition">Tạo Mã Mới</a>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Mã (Code)</th>
                <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Mức giảm</th>
                <th class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase">Thao tác</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            {% for coupon in coupons %}
            <tr class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 text-sm font-black text-blue-600">{{ coupon.code }}</td>
                <td class="px-6 py-4 text-sm font-bold text-red-500">-{{ coupon.discount_percent }}%</td>
                <td class="px-6 py-4 text-right text-sm">
                    <a href="{% url 'store:coupon_update' coupon.pk %}" class="text-blue-600 bg-blue-50 px-3 py-1.5 rounded-md mr-2">Sửa</a>
                    <a href="{% url 'store:coupon_delete' coupon.pk %}" class="text-red-600 bg-red-50 px-3 py-1.5 rounded-md">Xóa</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

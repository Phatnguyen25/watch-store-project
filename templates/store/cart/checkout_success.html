{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-20 text-center">
    <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
        <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
    </div>

    <h1 class="text-4xl font-extrabold text-gray-900 mb-4">Đặt hàng thành công!</h1>

    <p class="text-lg text-gray-600 mb-8 leading-relaxed">
        Cảm ơn bạn đã tin tưởng mua sắm tại <span class="font-bold text-blue-600">WatchStore</span>.<br>
        Hệ thống đã ghi nhận đơn hàng. Chúng tôi sẽ sớm liên hệ qua số điện thoại của bạn để xác nhận giao hàng.
    </p>

    <div class="flex flex-col sm:flex-row justify-center gap-4 mt-8">
        <a href="{% url 'store:product_list' %}" class="inline-block bg-blue-600 text-white font-bold py-4 px-8 rounded-xl shadow-lg hover:bg-blue-700 transition transform hover:-translate-y-1">
            ← Tiếp tục mua sắm
        </a>
    </div>
</div>
{% endblock %}

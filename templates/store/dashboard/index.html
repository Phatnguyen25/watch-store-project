{% extends 'base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto py-8 px-4">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">⚙️ Bảng Điều Khiển Quản Trị</h1>
    
    <div class="flex space-x-4 mb-8">
        <a href="{% url 'dashboard_product_list' %}" class="bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg shadow hover:bg-blue-700">Quản lý Sản phẩm</a>
        <a href="#" class="bg-gray-200 text-gray-700 font-semibold py-2 px-6 rounded-lg shadow hover:bg-gray-300">Quản lý Cửa hàng</a>
        <a href="#" class="bg-gray-200 text-gray-700 font-semibold py-2 px-6 rounded-lg shadow hover:bg-gray-300">Đơn hàng</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-500">
            <h3 class="text-gray-500 text-sm font-semibold uppercase">Tổng Sản Phẩm</h3>
            <p class="text-3xl font-bold text-gray-900 mt-2">{{ total_products }}</p>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-green-500">
            <h3 class="text-gray-500 text-sm font-semibold uppercase">Số Cửa Hàng</h3>
            <p class="text-3xl font-bold text-gray-900 mt-2">{{ total_stores }}</p>
        </div>
    </div>
</div>
{% endblock %}

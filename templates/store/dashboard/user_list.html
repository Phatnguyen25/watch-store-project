{% extends 'store/dashboard/dashboard_base.html' %}

{% block header_title %}Quản lý Người Dùng{% endblock %}

{% block dashboard_content %}
<div class="mb-6 flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
  <!-- Search & Filter Area -->
  <form method="GET" class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
    <div class="relative">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input type="text" name="q" value="{{ query }}" placeholder="Tìm tên hoặc email..." class="dashboard-search pl-10 pr-4 py-2 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm w-full md:w-64">
    </div>
    
    <select name="status" class="bg-white border text-sm border-gray-300 text-gray-900 rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2 shadow-sm">
      <option value="">Tất cả trạng thái</option>
      <option value="active" {% if status == 'active' %}selected{% endif %}>Hoạt động</option>
      <option value="inactive" {% if status == 'inactive' %}selected{% endif %}>Bị khóa</option>
    </select>
    
    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm">
      Lọc
    </button>
  </form>
</div>

<div id="dashboard-table-container">
    {% include 'store/dashboard/user_table_fragment.html' with users=users %}
</div>
{% endblock %}

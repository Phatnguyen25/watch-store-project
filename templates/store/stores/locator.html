{% extends 'base.html' %} {% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold text-gray-900 mb-6 text-center">
    📍 Tìm Cửa Hàng Gần Bạn
  </h1>

  <div class="flex justify-between items-center mb-6">
    <div id="loading-msg" class="hidden text-blue-600 font-bold animate-pulse text-sm">
        Đang quét GPS và tải danh sách cửa hàng...
    </div>
    <button
      onclick="findMyLocation()"
      class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-sm flex items-center transition text-sm ml-auto"
    >
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
      </svg>
      Làm mới định vị
    </button>
  </div>



  <div class="flex flex-col lg:flex-row gap-6">
    <!-- Sidebar List -->
    <div id="sidebar" class="w-full lg:w-1/3 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden hidden" style="max-h: 600px;">
      <div class="bg-blue-50 border-b border-blue-100 px-4 py-3 font-bold text-blue-900 flex justify-between items-center">
        <span>🏪 Cửa hàng gần nhất</span>
        <span id="result-count" class="bg-blue-600 text-white rounded-full px-2 py-0.5 text-xs">0</span>
      </div>
      <div id="store-list" class="overflow-y-auto flex-1 p-2 space-y-2">
        <!-- Results injected here -->
      </div>
    </div>

    <!-- Map -->
    <div class="w-full lg:flex-1">
      <div id="map" class="w-full h-[600px] rounded-xl shadow-2xl border-4 border-white z-0"></div>
    </div>
  </div>
</div>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"
/>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<style>
  /* Cứu các mảnh ghép bản đồ khỏi Tailwind */
  #map img {
    max-width: none !important;
  }

  /* 🌟 Cứu đường vẽ chỉ đường (SVG Path) khỏi Tailwind */
  path.leaflet-interactive {
    stroke: #2563eb !important;
    stroke-width: 6px !important;
    fill: none !important;
  }

  /* Ẩn triệt để cái bảng chữ chỉ đường mặc định của thư viện */
  .leaflet-routing-container {
    display: none !important;
  }
</style>
<script>
  // 1. Khởi tạo bản đồ (Zoom out để nhìn toàn bộ VN)
  var map = L.map("map").setView([14.0583, 108.2772], 6);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
  }).addTo(map);

  // Lưu tọa độ user nếu đã định vị
  var currentUserLat = null;
  var currentUserLng = null;

  // 2. Render tất cả các cửa hàng hiện có
  var allMarkers = [];
  {% for store in stores %}
  (function() {
      // Đề phòng Locale của Django tự biến dấu "chấm" thập phân thành dấu "phẩy"
      var yRaw = "{{ store.location.y|default:'' }}".replace(',', '.');
      var xRaw = "{{ store.location.x|default:'' }}".replace(',', '.');
      
      if (!yRaw || !xRaw || yRaw === "None") return;
      
      var sLat = parseFloat(yRaw);
      var sLng = parseFloat(xRaw);
      var sName = "{{ store.name|escapejs }}";
      var sAddress = "{{ store.address|escapejs }}";
      
      if (!isNaN(sLat) && !isNaN(sLng)) {
          var marker = L.marker([sLat, sLng])
            .addTo(map)
            .bindPopup("<div class='text-center'><b class='text-red-600 text-lg'>🏪 " + sName + "</b><br/><span class='text-sm text-gray-600'>" + sAddress + "</span></div>");
            
          marker.on('click', function() {
              routeToStore(sLat, sLng, sName, sAddress);
          });
          allMarkers.push(marker);
      }
  })();
  {% endfor %}

  function routeToStore(endLat, endLng, storeName, storeAddress) {
      if (currentUserLat && currentUserLng) {
          drawRoute(currentUserLat, currentUserLng, endLat, endLng, storeName, storeAddress, null);
      } else {
          if (!navigator.geolocation) {
              alert("Trình duyệt không hỗ trợ định vị!");
              return;
          }
          document.getElementById("loading-msg").classList.remove("hidden");
          document.getElementById("loading-msg").innerText = "Đang lấy vị trí của bạn để chỉ đường...";
          navigator.geolocation.getCurrentPosition(
              (position) => {
                  currentUserLat = position.coords.latitude;
                  currentUserLng = position.coords.longitude;
                  document.getElementById("loading-msg").classList.add("hidden");
                  drawRoute(currentUserLat, currentUserLng, endLat, endLng, storeName, storeAddress, null);
              },
              (error) => {
                  document.getElementById("loading-msg").classList.add("hidden");
                  alert("Bạn cần cho phép truy cập vị trí để xem đường đi!");
              },
              { enableHighAccuracy: true }
          );
      }
  }

  var routingControl = null;
  var userMarker = null;

  function drawRoute(startLat, startLng, endLat, endLng, storeName, storeAddress, el) {
    if (routingControl !== null) {
      map.removeControl(routingControl);
    }
    
    // Xóa marker user cũ nếu có
    if (userMarker) {
        map.removeLayer(userMarker);
    }

    routingControl = L.Routing.control({
      waypoints: [
        L.latLng(startLat, startLng),
        L.latLng(endLat, endLng)
      ],
      routeWhileDragging: false,
      show: false,
      lineOptions: { styles: [{ color: "#2563eb", opacity: 0.9, weight: 6 }] },
      createMarker: function (i, wp, nWps) {
        // Chỉ tạo Marker cho vị trí User (i=0)
        if (i === 0) {
            return L.marker(wp.latLng).bindPopup("<b style='color:#2563eb;'>📍 Vị trí hiện tại của bạn</b>").openPopup();
        }
        return null; // Không tạo marker mới của Routing cho cửa hàng
      }
    }).addTo(map);

    // Kéo góc nhìn tới khu vực cửa hàng
    map.flyTo([endLat, endLng], 14, { duration: 1.5 });

    // Tìm Marker gốc của cửa hàng và bật Popup
    allMarkers.forEach(function(m) {
        var pos = m.getLatLng();
        // So sánh với dung sai nhỏ
        if (Math.abs(pos.lat - endLat) < 0.0001 && Math.abs(pos.lng - endLng) < 0.0001) {
            m.openPopup();
        }
    });
  }

  // 3. Tự động lấy vị trí khi load trang
  window.addEventListener('load', function() {
      findMyLocation();
  });

  function findMyLocation() {

    if (!navigator.geolocation) {
      alert("Trình duyệt của bạn không hỗ trợ định vị!");
      return;
    }

    document.getElementById("loading-msg").classList.remove("hidden");

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        
        currentUserLat = lat;
        currentUserLng = lng;

        fetch(`/api/find-nearest/?lat=${lat}&lng=${lng}`)
          .then((response) => response.json())
          .then((data) => {
            document.getElementById("loading-msg").classList.add("hidden");

            if (data.found && data.results.length > 0) {
              document.getElementById("sidebar").classList.remove("hidden");
              document.getElementById("result-count").innerText = data.results.length;

              const listEl = document.getElementById("store-list");
              listEl.innerHTML = "";

              data.results.forEach((store, index) => {
                 let isActive = index === 0 ? "bg-blue-50 border-blue-200 ring-2 ring-blue-500" : "bg-white hover:bg-gray-50 border-gray-100";
                 let escName = store.name.replace(/'/g, "\\'");
                 let escAddress = store.address.replace(/'/g, "\\'");
                 
                 let html = `
                    <div class="p-4 border rounded-lg cursor-pointer transition ${isActive}" onclick="drawRoute(${lat}, ${lng}, ${store.lat}, ${store.lng}, '${escName}', '${escAddress}', this)">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-gray-900 line-clamp-1 flex-1 pr-2">${store.name}</h3>
                            <span class="bg-red-100 text-red-800 text-xs font-bold px-2 py-1 rounded-full whitespace-nowrap">${store.distance_km} km</span>
                        </div>
                        <p class="text-xs text-gray-500 line-clamp-2 mb-2">${store.address}</p>
                        <div class="text-xs text-blue-600 font-medium">
                           🚗 Lái xe ~ ${store.time_minutes} phút
                        </div>
                    </div>
                 `;
                 listEl.innerHTML += html;
              });

              // Vẽ đường cho thằng đầu tiên
              let closest = data.results[0];
              drawRoute(lat, lng, closest.lat, closest.lng, closest.name, closest.address, null);
              
            } else {
              alert("Không tìm thấy dữ liệu cửa hàng nào ở gần bạn!");
            }
          });
      },
      (error) => {
        alert("Bạn cần cho phép trình duyệt truy cập Vị trí (Location)!");
      },
      { enableHighAccuracy: true }, // Bật GPS độ chính xác cao
    );
  }
</script>
{% endblock %}

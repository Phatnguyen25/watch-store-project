{% extends 'base.html' %} {% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold text-gray-900 mb-6 text-center">
    📍 Tìm Cửa Hàng Gần Bạn
  </h1>

  <div class="flex justify-center mb-8">
    <button
      onclick="findMyLocation()"
      class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full shadow-lg flex items-center transition transform hover:scale-105"
    >
      <svg
        class="w-6 h-6 mr-2"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
        ></path>
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
        ></path>
      </svg>
      Tìm cửa hàng gần nhất
    </button>
  </div>

  <div
    id="result-box"
    class="hidden bg-green-50 border border-green-200 rounded-lg p-4 mb-6 text-center"
  >
    <p class="text-green-800 font-medium">
      🎉 Đã tìm thấy: <span id="store-name" class="font-bold"></span>
    </p>
    <p class="text-sm text-green-600">
      Cách bạn: <span id="store-distance"></span> km
    </p>
  </div>

  <div
    id="map"
    class="w-full h-[500px] rounded-xl shadow-2xl border-4 border-white z-0"
  ></div>
</div>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"
/>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<style>
  /* Cứu các mảnh ghép bản đồ khỏi Tailwind */
  #map img {
    max-width: none !important;
  }

  /* 🌟 Cứu đường vẽ chỉ đường (SVG Path) khỏi Tailwind */
  path.leaflet-interactive {
    stroke: #2563eb !important;
    stroke-width: 6px !important;
    fill: none !important;
  }

  /* Ẩn triệt để cái bảng chữ chỉ đường mặc định của thư viện */
  .leaflet-routing-container {
    display: none !important;
  }
</style>
<script>
  // 1. Khởi tạo bản đồ
  var map = L.map("map").setView([10.7769, 106.7009], 13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
  }).addTo(map);

  // Biến chứa đường đi để xóa đi vẽ lại nếu khách bấm tìm nhiều lần
  var routingControl = null;

  function findMyLocation() {
    if (!navigator.geolocation) {
      alert("Trình duyệt của bạn không hỗ trợ định vị!");
      return;
    }

    document.getElementById("result-box").classList.remove("hidden");
    document.getElementById("store-name").innerText =
      "Đang quét GPS và tìm đường...";
    document.getElementById("store-distance").innerText = "...";

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        // Gọi API Backend tìm cửa hàng gần nhất
        fetch(`/api/find-nearest/?lat=${lat}&lng=${lng}`)
          .then((response) => response.json())
          .then((data) => {
            if (data.found) {
              document.getElementById("store-name").innerText = data.name;

              // Xóa đường đi cũ nếu có
              if (routingControl !== null) {
                map.removeControl(routingControl);
              }

              // 🚀 VẼ ĐƯỜNG ĐI MÀU XANH BẰNG ROUTING MACHINE
              routingControl = L.Routing.control({
                waypoints: [
                  L.latLng(lat, lng), // Điểm A: Vị trí của bạn
                  L.latLng(data.lat, data.lng), // Điểm B: Cửa hàng
                ],
                routeWhileDragging: false,
                show: false, // Ẩn cái bảng chỉ đường text lằng nhằng
                lineOptions: {
                  styles: [{ color: "#2563eb", opacity: 0.9, weight: 6 }], // Màu xanh dương Tailwind
                },
                // Tự động cắm ghim cho 2 đầu
                createMarker: function (i, wp, nWps) {
                  if (i === 0) {
                    return L.marker(wp.latLng)
                      .bindPopup(
                        "<b style='color:#2563eb;'>📍 Vị trí của bạn</b>",
                      )
                      .openPopup();
                  } else {
                    return L.marker(wp.latLng)
                      .bindPopup(
                        `<b style='color:#dc2626;'>🏪 ${data.name}</b><br>${data.address}`,
                      )
                      .openPopup();
                  }
                },
              }).addTo(map);

              // 🌟 BẮT SỰ KIỆN LẤY QUÃNG ĐƯỜNG THỰC TẾ
              routingControl.on("routesfound", function (e) {
                var summary = e.routes[0].summary;
                var distanceKm = (summary.totalDistance / 1000).toFixed(1);
                var timeMinutes = Math.round(summary.totalTime / 60);

                document.getElementById("store-distance").innerHTML = `
                      <span class="font-bold text-blue-600">${distanceKm} km</span> 
                      (Lái xe khoảng <span class="font-bold text-red-500">${timeMinutes} phút</span>)
                  `;
              });
            } else {
              document.getElementById("store-name").innerText =
                "Không tìm thấy cửa hàng nào!";
              document.getElementById("store-distance").innerText = "-";
            }
          });
      },
      (error) => {
        alert("Bạn cần cho phép trình duyệt truy cập Vị trí (Location)!");
      },
      { enableHighAccuracy: true }, // Bật GPS độ chính xác cao
    );
  }
</script>
{% endblock %}

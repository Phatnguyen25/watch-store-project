{% load humanize %}
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}O2O Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
  </head>
  <body class="bg-gray-50 font-sans flex h-screen overflow-hidden">
    {% include 'sidebar.html' %}

    <main class="flex-1 flex flex-col overflow-y-auto bg-gray-50 relative">
      <header
        class="h-16 bg-white shadow-sm flex items-center justify-between px-8 sticky top-0 z-20"
      >
        <h2 class="text-xl font-bold text-gray-800">
          {% block header_title %}Dashboard{% endblock %}
        </h2>
        <div class="flex items-center gap-4 text-sm font-medium text-gray-600">
          <span>👋 Xin chào, Tech Lead</span>
          <img
            src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff"
            class="w-8 h-8 rounded-full shadow-sm"
          />
        </div>
      </header>

      <div class="p-8">{% block dashboard_content %}{% endblock %}</div>
    </main>
  </body>
</html>
